#=============================================================
#          Multi TvT Event Engine (Multi Team vs Team)
#=============================================================

# Enable/Disable TvTEvent System
MultiTvTEventEnabled = True

# Times TvT will occur (24h format).
MultiTvTEventInterval = 05:00,11:00,17:00,23:00
# Registration timer from start of event (in minutes).
MultiTvTEventParticipationTime = 5

# Event running time (in minutes).
MultiTvTEventRunningTime = 5

# Location name of EventManager.
MultiTvTNpcLocName = Giran Town

# TvT Event NPC (create a custom npc of type L2EventManager).
MultiTvTEventParticipationNpcId = 50310

# Location for TvTEvent NPC to spawn in form x,y,z,[heading]
MultiTvTEventParticipationNpcCoordinates = 82840,148648,-3416

# TvT Event Participation Fee (itemId, number). Fee is not returned.
# Example: 57,100000
# Default = 0,0
MultiTvTEventParticipationFee = 0,0

# Reward for winning team.
# Example: TvTEventRewardWinners = itemId,min,max,chance;itemId,min,max,chance;itemId,min,max,chance;...
MultiTvTEventRewardWinners = 9501,50,50

# Min/Max amount of players allowed in each team.
MultiTvTEventMinPlayersInTeams = 1
MultiTvTEventMaxPlayersInTeams = 500

# Min/Max level of players that may join the event.
MultiTvTEventMinPlayerLevel = 76
MultiTvTEventMaxPlayerLevel = 80

# Repsawn and exit delay timers (in seconds).
MultiTvTEventRespawnTeleportDelay = 5
MultiTvTEventStartLeaveTeleportDelay = 5

# First Team - Name, Start/Death x,y,z location. BLUE
MultiTvTEventTeam1Name = Omega
MultiTvTEventTeam1Coordinates = 125752,-69624,-3240

# Second Team - Name, Start/Death x,y,z location. RED
MultiTvTEventTeam2Name = Alpha
MultiTvTEventTeam2Coordinates = 123464,-68360,-3288

# First Team - Name, Start/Death x,y,z location. Yellow
MultiTvTEventTeam3Name = Beta
MultiTvTEventTeam3Coordinates = 125752,-69624,-3240

# Second Team - Name, Start/Death x,y,z location. Green
MultiTvTEventTeam4Name = Delta
MultiTvTEventTeam4Coordinates = 123464,-68360,-3288

# TvTEvent Rules
MultiTvTEventTargetTeamMembersAllowed = False
MultiTvTEventScrollsAllowed = False
MultiTvTEventPotionsAllowed = False
MultiTvTEventSummonByItemAllowed = False

# Door ID's to open on TvT finish.
MultiTvTDoorsToOpen = 24190001;24190002;24190003;24190004
# Door ID's to open on TvT start.
MultiTvTDoorsToClose = 24190001;24190002;24190003;24190004

# Should both teams get reward if there's a tie?
MultiTvTRewardTeamTie = False

# Participant's effects handling on teleport/death.
# Effects lasting through death never removed.
# 0 - always remove all effects.
# 1 - remove all effects only during port to event (noblesse blessing can be used)
# 2 - never remove any effect
# Default: 0
MultiTvTEventEffectsRemoval = 2

# Fighter-class participants will be buffed with those buffs each respawn
# Format: skill1Id,skill1Level;skill2Id,skill2Level;...
# Example: 1504,1;1501,1;1502,1;1499,1
MultiTvTEventFighterBuffs = 

# Mage-class participants will be buffed with those buffs each respawn
# Format: skill1Id,skill1Level;skill2Id,skill2Level;...
# Example: 1504,1;1500,1;1501,1;1085,3
MultiTvTEventMageBuffs = 

# Enabling this option will not be possible to register for the event with the specified number of Box.
# Default: True
MultiTvTEventMultiBoxEnable = True
# Box number allowed inside the event.
# Default: 1
MultiTvTEventNumberBoxRegister = 5

# Define if TvTEvent will reward everyone or only players who have killed 1 or more.
# Default: False
MultiTvTRewardOnlyKillers = True

# Method to show player's kill on the TvT event.
# Choose "pm" for an automatic personal message to the player team.
# Example: "Player1: I have killed Player2 !".
# Put "title" for an automatic title that counts the player's kills.
# Example: "Kills: number" (title will be restored at the event end).
# Put "pmtitle" for both methods (pmtitle and title).
# Default: title
MultiTvTEventOnKill = title

# ID of classes that are not allowed to join the tvt
MultiTvTDisabledForClasses = 16,97,30,105,43,112

# TvT Time BOX Invite
# Default: False
AllowDlgMultiTvTInvite = False

# Enabling rewarding disconected players
# Default: False
MultiTvTRewardNoCarrierPlayers = True

# TvT Peace Zone attack
# Default: False
EnableMultiTvTPeaceZoneAttack = True

# TvT World Instance System
# Default: False
EnableMultiTvTInstance = True
# TvT World Instance ID
MultiTvTInstanceId = 5
